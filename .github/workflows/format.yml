name: Formato (clang-format)

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  format:
    name: Verificar formato
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt
        uses: actions/cache@v5
        with:
          path: |
            /var/cache/apt/archives/partial
            /var/cache/apt/archives
          key: ${{ runner.os }}-apt-format
          restore-keys: ${{ runner.os }}-apt-

      - name: Instalar clang-format
        run: sudo apt-get update -qq && sudo apt-get install -y clang-format

      - name: Verificar formato
        run: ./check.sh --format
