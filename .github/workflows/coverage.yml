name: Coverage

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive
    
    - name: Cache apt packages
      uses: actions/cache@v5
      with:
        path: |
          /var/cache/apt/archives/partial
          /var/cache/apt/archives
        key: ${{ runner.os }}-apt-cov-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: ${{ runner.os }}-apt-cov-
    
    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          build-essential \
          cmake \
          libbz2-dev \
          libfftw3-dev \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-net-dev \
          libopenal-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libtinyxml-dev \
          lcov \
          ccache
    
    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-ccache-cov-${{ hashFiles('CMakeLists.txt', 'src/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-ccache-cov-
    
    - name: Build with coverage
      run: ./check.sh --coverage
    
    - name: Generate coverage report
      run: |
        cd build/coverage
        lcov --summary coverage.info
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./build/coverage/coverage.info
        flags: unittests
        name: codecov-dangerdeep
        fail_ci_if_error: false
    
    - name: Upload coverage HTML
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: build/coverage/html/
