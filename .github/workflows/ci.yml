name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Cache apt packages
      uses: actions/cache@v4
      with:
        path: |
          /var/cache/apt/archives/partial
          /var/cache/apt/archives
        key: ${{ runner.os }}-apt-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: ${{ runner.os }}-apt-
    
    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          build-essential \
          cmake \
          libbz2-dev \
          libfftw3-dev \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-net-dev \
          libopenal-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libtinyxml-dev \
          ccache
    
    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-ccache-${{ hashFiles('CMakeLists.txt', 'src/CMakeLists.txt', 'src/test/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-ccache-
    
    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DBUILD_UNIT_TESTS=ON \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
    
    - name: Build
      run: |
        cd build
        make -j$(nproc)
    
    - name: Run Tests
      run: |
        cd build
        export DFTD_DATA=${{ github.workspace }}/data
        ctest --output-on-failure --timeout 30
    
    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: build/Testing/Temporary/LastTest.log
